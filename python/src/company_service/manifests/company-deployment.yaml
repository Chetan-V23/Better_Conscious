apiVersion: apps/v1
kind: Deployment
metadata:
  name: company
  labels:
    app: company
spec:
  replicas: 2
  selector:
    matchLabels:
      app: company
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 8
  template:
    metadata:
      labels:
        app: company
    spec:
      containers:
        - name: company
          image: r0dent/company
          ports:
            - containerports: 8081
          envFrom:
            - configMapRef:
                name: company-configmap
            - secretRef:
                name: company-secret